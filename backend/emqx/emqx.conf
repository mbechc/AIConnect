node {
  name = "emqx@127.0.0.1"
  cookie = "aiconnect-poc-cookie-change-me"
  data_dir = "data"
}

log {
  console_handler {
    level = warning
  }
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
}

listeners.ssl.default {
  bind = "0.0.0.0:8883"
  ssl_options {
    cacertfile = "/opt/emqx/etc/certs/ca.crt"
    certfile = "/opt/emqx/etc/certs/server.crt"
    keyfile = "/opt/emqx/etc/certs/server.key"
    verify = verify_none
    fail_if_no_peer_cert = false
  }
}

dashboard {
  listeners.http {
    bind = 18083
  }
}

authorization {
  no_match = deny
  deny_action = ignore
  cache {
    enable = false
  }
  sources = []
}

authentication = []
