{allow, all, publish, ["aic/v1/claim/request"]}.
{allow, all, publish, ["aic/v1/devices/${clientid}/heartbeat", "aic/v1/devices/${clientid}/status", "aic/v1/devices/${clientid}/event", "aic/v1/devices/${clientid}/events", "aic/v1/devices/${clientid}/sessions/+/rx", "aic/v1/devices/${clientid}/sessions/+/opened", "aic/v1/devices/${clientid}/sessions/+/closed", "aic/v1/devices/${clientid}/sessions/+/event"]}.
{allow, all, subscribe, ["aic/v1/devices/${clientid}/config/set", "aic/v1/devices/${clientid}/commands/factory-reset", "aic/v1/devices/${clientid}/sessions/+/open", "aic/v1/devices/${clientid}/sessions/+/tx", "aic/v1/devices/${clientid}/sessions/+/close"]}.
{deny, all}.
