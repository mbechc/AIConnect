services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiconnect}
      POSTGRES_USER: ${POSTGRES_USER:-aiconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  mcp:
    build: ./api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
    command: ["python", "-m", "app.mcp_server"]
    ports:
      - "127.0.0.1:${MCP_PORT:-8001}:8001"

  emqx:
    image: emqx/emqx:5.8.6
    restart: unless-stopped
    environment:
      EMQX_NAME: aiconnect
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-change-me-dashboard-password}
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      - ./certs:/opt/emqx/etc/certs:ro
    ports:
      - "8883:8883"
      - "127.0.0.1:18083:18083"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://mqtts.itego.dk}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  emqx_data:
  emqx_log:
  caddy_data:
  caddy_config:
